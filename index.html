<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Surat Kuasa Digital</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; }
    }
    .print-only { display: none; }
  </style>
</head>

<body class="bg-gray-100">
<div id="root"></div>

<script type="text/babel">
const GAS_URL = "https://script.google.com/macros/s/AKfycbxwdxWnLdX_OnyXUSCeAGbzoQQGKeUCGQYn4jQBzcIVulkYQglzs-nvxXlv268m13Kv/exec";

// ================= FETCH UNIVERSAL =================
const fetchGAS = async (payload) => {
  console.log("SEND:", payload);

  try {
    // POST JSON
    let res = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    let data = await res.json();
    console.log("RES:", data);

    if (data.status === "error") {
      // fallback GET
      const query = new URLSearchParams(payload).toString();
      const getRes = await fetch(`${GAS_URL}?${query}`);
      data = await getRes.json();
      console.log("FALLBACK RES:", data);
    }

    return data;

  } catch (err) {
    console.error("FETCH ERROR:", err);
    return { status: "error", message: "Koneksi gagal" };
  }
};

// ================= APP =================
function App() {
  const [view, setView] = React.useState("form");
  const [no, setNo] = React.useState("");
  const [data, setData] = React.useState(null);

  const [form, setForm] = React.useState({
    nama_pemberi: "",
    jabatan_pemberi: "",
    nama_penerima: "",
    jabatan_penerima: "",
    wewenang: ""
  });

  // ================= SUBMIT =================
  const submit = async () => {
    const res = await fetchGAS({
      action: "submitSuratKuasa",
      ...form
    });

    if (res.status === "ok") {
      alert("Berhasil! No: " + res.nomorSurat);
      setNo(res.nomorSurat);
      setView("cetak");
      search(res.nomorSurat);
    } else {
      alert(res.message);
    }
  };

  // ================= SEARCH =================
  const search = async (override) => {
    const nomor = override || no;

    const res = await fetchGAS({
      action: "getSurat",
      no: nomor
    });

    if (res.status === "ok") {
      setData(res.surat);
    } else {
      alert(res.message);
      setData(null);
    }
  };

  // ================= APPROVE =================
  const approve = async (decision) => {
    const res = await fetchGAS({
      action: "approve",
      nomorSurat: data.nomorSurat,
      role: "Ketua",
      decision: decision
    });

    if (res.status === "ok") {
      alert("Berhasil");
      search();
    } else {
      alert(res.message);
    }
  };

  return (
    <div className="p-6 max-w-xl mx-auto">

      <div className="flex gap-2 mb-4 no-print">
        <button onClick={()=>setView("form")}>Form</button>
        <button onClick={()=>setView("cetak")}>Cek</button>
      </div>

      {view === "form" && (
        <div className="bg-white p-4 rounded shadow space-y-3">
          <input placeholder="Nama Pemberi"
            onChange={e=>setForm({...form,nama_pemberi:e.target.value})}
            className="border p-2 w-full"/>

          <input placeholder="Jabatan Pemberi"
            onChange={e=>setForm({...form,jabatan_pemberi:e.target.value})}
            className="border p-2 w-full"/>

          <input placeholder="Nama Penerima"
            onChange={e=>setForm({...form,nama_penerima:e.target.value})}
            className="border p-2 w-full"/>

          <input placeholder="Jabatan Penerima"
            onChange={e=>setForm({...form,jabatan_penerima:e.target.value})}
            className="border p-2 w-full"/>

          <textarea placeholder="Wewenang"
            onChange={e=>setForm({...form,wewenang:e.target.value})}
            className="border p-2 w-full"/>

          <button onClick={submit}
            className="bg-blue-600 text-white px-4 py-2 rounded">
            Submit
          </button>
        </div>
      )}

      {view === "cetak" && (
        <div className="space-y-4">
          <div className="no-print">
            <input value={no}
              onChange={e=>setNo(e.target.value)}
              className="border p-2"/>

            <button onClick={()=>search()}
              className="ml-2 bg-green-600 text-white px-3 py-2 rounded">
              Cari
            </button>
          </div>

          {data && (
            <>
              <div className="bg-white p-4 rounded shadow">
                <p><b>No:</b> {data.nomorSurat}</p>
                <p><b>Status:</b> {data.status}</p>
                <p><b>Pemberi:</b> {data.nama_pemberi}</p>
                <p><b>Penerima:</b> {data.nama_penerima}</p>
              </div>

              {data.status === "Menunggu Ketua" && (
                <div className="no-print flex gap-2">
                  <button onClick={()=>approve("setuju")}
                    className="bg-green-600 text-white px-3 py-2 rounded">
                    Setujui
                  </button>
                  <button onClick={()=>approve("tolak")}
                    className="bg-red-600 text-white px-3 py-2 rounded">
                    Tolak
                  </button>
                </div>
              )}

              {data.status === "Disetujui" && (
                <>
                  <button onClick={()=>window.print()}
                    className="no-print bg-black text-white px-4 py-2">
                    Print
                  </button>

                  <div className="print-only mt-10">
                    <h2 className="text-center font-bold">SURAT KUASA</h2>
                    <p>No: {data.nomorSurat}</p>
                    <p>Pemberi: {data.nama_pemberi}</p>
                    <p>Penerima: {data.nama_penerima}</p>
                    <p>Wewenang: {data.wewenang}</p>
                  </div>
                </>
              )}
            </>
          )}
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
