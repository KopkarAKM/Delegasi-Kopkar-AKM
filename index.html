<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Surat Kuasa Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .font-playfair { font-family: 'Playfair Display', serif; }
    @media print {
      @page { margin: 1.5cm; size: A4 portrait; }
      body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      #print-area { padding: 0 !important; border: none !important; box-shadow: none !important; }
    }
  </style>
</head>
<body class="bg-[#faf7f0] text-[#1a1a2e]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Icon = ({ path, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
    );

    const icons = {
      FileText: '<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>',
      CheckCircle: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
      Clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
      Shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
      Printer: '<polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>',
      X: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
      ChevronRight: '<polyline points="9 18 15 12 9 6"/>',
      ChevronLeft: '<polyline points="15 18 9 12 15 6"/>',
      CheckSquare: '<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2-2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
      Square: '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>',
      Check: '<polyline points="20 6 9 17 4 12"/>',
      User: '<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
      Search: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
      Lock: '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
      LogOut: '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>'
    };

    const FileText = (p) => <Icon path={icons.FileText} {...p} />;
    const CheckCircle = (p) => <Icon path={icons.CheckCircle} {...p} />;
    const Clock = (p) => <Icon path={icons.Clock} {...p} />;
    const Shield = (p) => <Icon path={icons.Shield} {...p} />;
    const Printer = (p) => <Icon path={icons.Printer} {...p} />;
    const XIcon = (p) => <Icon path={icons.X} {...p} />;
    const ChevronRight = (p) => <Icon path={icons.ChevronRight} {...p} />;
    const ChevronLeft = (p) => <Icon path={icons.ChevronLeft} {...p} />;
    const CheckSquare = (p) => <Icon path={icons.CheckSquare} {...p} />;
    const SquareIcon = (p) => <Icon path={icons.Square} {...p} />;
    const CheckIcon = (p) => <Icon path={icons.Check} {...p} />;
    const UserIcon = (p) => <Icon path={icons.User} {...p} />;
    const SearchIcon = (p) => <Icon path={icons.Search} {...p} />;
    const LockIcon = (p) => <Icon path={icons.Lock} {...p} />;
    const LogOutIcon = (p) => <Icon path={icons.LogOut} {...p} />;

    // URL DEPLOY GOOGLE APPS SCRIPT TERBARU
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxwdxWnLdX_OnyXUSCeAGbzoQQGKeUCGQYn4jQBzcIVulkYQglzs-nvxXlv268m13Kv/exec';

    const App = () => {
      const params = new URLSearchParams(window.location.search);
      const initialView = params.get('view') || 'form';
      const initialNo = params.get('no') || '';

      const [appView, setAppView] = useState(initialView);
      const [formStep, setFormStep] = useState(1);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitSuccess, setSubmitSuccess] = useState(null);
      const [formData, setFormData] = useState({
        nama_pemberi: '', jabatan_pemberi: '', hp_pemberi: '', email_pemberi: '', alasan: '',
        berlaku_mulai: '', berlaku_sampai: '',
        nama_penerima: '', jabatan_penerima: '', hp_penerima: '',
        wewenang: [], keterangan_wewenang: ''
      });

      const wewenangOptions = [
        'Pencairan Dana', 'Penandatanganan Dokumen', 
        'Urusan Perbankan', 'Mewakili Rapat', 
        'Korespondensi Resmi', 'Lainnya'
      ];

      useEffect(() => {
        const today = new Date();
        const nextWeek = new Date(today);
        nextWeek.setDate(today.getDate() + 7);
        setFormData(prev => ({
          ...prev,
          berlaku_mulai: prev.berlaku_mulai || today.toISOString().split('T')[0],
          berlaku_sampai: prev.berlaku_sampai || nextWeek.toISOString().split('T')[0]
        }));
      }, []);

      const toggleWewenang = (w) => {
        setFormData(prev => ({
          ...prev,
          wewenang: prev.wewenang.includes(w) 
            ? prev.wewenang.filter(item => item !== w) 
            : [...prev.wewenang, w]
        }));
      };

      // FUNGSI KOMUNIKASI "AUTO-FALLBACK" PINTAR
      const fetchGAS = async (payload) => {
        try {
          // 1. Coba tarik data dengan metode POST
          let res = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          let data = await res.json();

          // 2. Jika Server merespons "Unknown POST action" / "Unknown GET action",
          // Artinya server masih mengeksekusi versi script lama. 
          // Kita otomatis melakukan Fallback memanggil data via parameter URL (GET).
          if (data.status === 'error' && (data.message.includes('Unknown POST') || data.message.includes('Unknown GET'))) {
            console.log("Terdeteksi GAS versi lama. Melakukan fallback otomatis ke metode URL GET...");
            const query = new URLSearchParams(payload).toString();
            const getRes = await fetch(`${GAS_URL}?${query}`, { method: 'GET' });
            data = await getRes.json();
          }

          return data;
        } catch (err) {
          console.error("Kesalahan komunikasi fetch:", err);
          throw err;
        }
      };

      const handleSubmitForm = async () => {
        setIsSubmitting(true);
        try {
          const payload = {
            action: 'submitSuratKuasa',
            ...formData,
            wewenang: formData.wewenang.join(', ')
          };
          const data = await fetchGAS(payload);
          if (data.status === 'ok') {
            setSubmitSuccess(data.nomorSurat);
            setFormStep(4);
          } else {
            alert('Gagal mengirim data. ' + data.message);
          }
        } catch (e) {
          alert('Koneksi terputus. Pastikan perangkat Anda terhubung ke internet.');
        } finally {
          setIsSubmitting(false);
        }
      };

      const resetForm = () => {
        setFormData({
          ...formData,
          nama_pemberi: '', jabatan_pemberi: '', hp_pemberi: '', email_pemberi: '', alasan: '',
          nama_penerima: '', jabatan_penerima: '', hp_penerima: '', wewenang: [], keterangan_wewenang: ''
        });
        setSubmitSuccess(null);
        setFormStep(1);
      };

      // PORTAL PERSETUJUAN
      const [approvalRole, setApprovalRole] = useState('');
      const [approvalPin, setApprovalPin] = useState('');
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [approvalList, setApprovalList] = useState([]);
      const [isLoadingList, setIsLoadingList] = useState(false);
      const [selectedSurat, setSelectedSurat] = useState(null);
      const [catatanApproval, setCatatanApproval] = useState('');
      const PINS = { Ketua: '1234', Manager: '5678' };

      const handleLogin = () => {
        if (!approvalRole || approvalPin !== PINS[approvalRole]) {
          alert('Data autentikasi tidak sesuai.');
          return;
        }
        setIsLoggedIn(true);
        fetchApprovalList(approvalRole);
      };

      const fetchApprovalList = async (role) => {
        setIsLoadingList(true);
        try {
          const data = await fetchGAS({ action: 'getList', role: role });
          
          // PENGECEKAN EKSPILISIT AGAR TIDAK GAGAL DIAM-DIAM
          if (data.status === 'ok') {
            setApprovalList(data.rows || []);
          } else {
            alert('Server merespons error: ' + data.message);
            setApprovalList([]);
          }
        } catch (e) {
          alert('Gagal memuat daftar persetujuan. Periksa koneksi internet Anda.');
        } finally {
          setIsLoadingList(false);
        }
      };

      const handleApprove = async (nomorSurat, decision) => {
        if (!window.confirm(`Proses tindakan ini untuk dokumen ${nomorSurat}?`)) return;
        setIsLoadingList(true);
        try {
          const data = await fetchGAS({
            action: 'approve',
            nomorSurat,
            role: approvalRole,
            decision,
            catatan: catatanApproval
          });
          if (data.status === 'ok') {
            alert('Tindakan berhasil diproses.');
            setSelectedSurat(null);
            setCatatanApproval('');
            fetchApprovalList(approvalRole);
          } else {
            alert('Sistem menolak tindakan: ' + data.message);
          }
        } catch (e) {
          alert('Koneksi terputus saat mengirim persetujuan.');
        } finally {
          setIsLoadingList(false);
        }
      };

      const needsMyApproval = (row) => {
        if (approvalRole === 'Ketua') return row.status === 'Menunggu Ketua';
        if (approvalRole === 'Manager') return row.status === 'Menunggu Manager';
        return false;
      };

      // CEK DAN CETAK
      const [searchNo, setSearchNo] = useState(initialNo);
      const [searchResult, setSearchResult] = useState(null);
      const [isSearching, setIsSearching] = useState(false);
      const [searchError, setSearchError] = useState(false);

      const handleSearch = async (overrideNo) => {
        const queryNo = typeof overrideNo === 'string' ? overrideNo.trim() : searchNo.trim();
        if (!queryNo) return;
        setIsSearching(true);
        setSearchError(false);
        setSearchResult(null);
        try {
          const data = await fetchGAS({ action: 'getSurat', no: queryNo.toUpperCase() });
          
          if (data.status === 'ok' && data.surat) {
            setSearchResult(data.surat);
          } else {
            console.error("Pelacakan gagal:", data.message);
            setSearchError(true);
          }
        } catch (e) {
          console.error("Fetch error:", e);
          setSearchError(true);
        } finally {
          setIsSearching(false);
        }
      };

      useEffect(() => {
        if (initialView === 'cetak' && initialNo) {
          handleSearch(initialNo);
        }
      }, []);

      const formatDateId = (dStr) => {
        if (!dStr) return '-';
        const dateObj = new Date(dStr);
        if (!isNaN(dateObj)) {
          const d = dateObj.getDate();
          const m = dateObj.getMonth();
          const y = dateObj.getFullYear();
          const bln = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
          return `${d} ${bln[m]} ${y}`;
        }
        return dStr;
      };

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-[#0d1b2a] relative overflow-hidden no-print">
            <div className="absolute -top-16 -right-16 w-72 h-72 rounded-full bg-[#c9a84c] opacity-10 blur-3xl pointer-events-none"></div>
            <div className="max-w-5xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-4 relative z-10">
              <div className="flex items-center gap-4 w-full md:w-auto">
                <div className="w-12 h-12 bg-[#c9a84c] rounded-xl flex items-center justify-center font-playfair text-xl font-bold text-[#0d1b2a]">
                  KA
                </div>
                <div>
                  <h1 className="font-playfair text-lg text-white tracking-wide leading-tight">e-Surat Kuasa Digital</h1>
                  <p className="text-[11px] text-white/60 mt-0.5">Koperasi Karyawan Adaro Karya Mandiri</p>
                </div>
              </div>
              <div className="flex gap-2 w-full md:w-auto overflow-x-auto pb-1 md:pb-0">
                <button onClick={() => setAppView('form')} className={`px-4 py-2 rounded-lg text-xs font-semibold whitespace-nowrap transition-colors ${appView === 'form' ? 'bg-[#c9a84c] text-[#0d1b2a]' : 'border border-[#c9a84c]/40 text-[#e4c475] hover:bg-[#c9a84c]/10'}`}>Buat Surat</button>
                <button onClick={() => setAppView('approval')} className={`px-4 py-2 rounded-lg text-xs font-semibold whitespace-nowrap transition-colors ${appView === 'approval' ? 'bg-[#c9a84c] text-[#0d1b2a]' : 'border border-[#c9a84c]/40 text-[#e4c475] hover:bg-[#c9a84c]/10'}`}>Persetujuan</button>
                <button onClick={() => setAppView('cetak')} className={`px-4 py-2 rounded-lg text-xs font-semibold whitespace-nowrap transition-colors ${appView === 'cetak' ? 'bg-[#c9a84c] text-[#0d1b2a]' : 'border border-[#c9a84c]/40 text-[#e4c475] hover:bg-[#c9a84c]/10'}`}>Cek & Cetak</button>
              </div>
            </div>
          </header>

          <main className="max-w-5xl mx-auto w-full p-4 sm:p-6 no-print flex-grow">
            
            {/* VIEW FORM PENGAJUAN */}
            {appView === 'form' && (
              <div className="animate-in fade-in duration-500">
                {formStep < 4 && (
                  <div className="mb-8">
                    <h2 className="font-playfair text-2xl text-[#0d1b2a] mb-2">Formulir Pengajuan Surat Kuasa</h2>
                    <div className="flex items-center gap-2 mt-4 overflow-x-auto pb-2">
                      {[1, 2, 3].map((step) => (
                        <React.Fragment key={step}>
                          <div className={`flex items-center gap-2 px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-colors ${formStep === step ? 'bg-[#0d1b2a] text-[#c9a84c]' : formStep > step ? 'bg-[#c9a84c] text-[#0d1b2a]' : 'bg-white border border-[#ddd5c0] text-slate-400'}`}>
                            <div className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] ${formStep === step ? 'bg-[#c9a84c]/20' : formStep > step ? 'bg-[#0d1b2a]/20' : 'bg-slate-100'}`}>
                              {formStep > step ? <CheckIcon size={12} /> : step}
                            </div>
                            {step === 1 ? 'Data Pemberi' : step === 2 ? 'Penerima & Wewenang' : 'Review & Kirim'}
                          </div>
                          {step < 3 && <div className={`w-8 h-[2px] ${formStep > step ? 'bg-[#c9a84c]' : 'bg-[#ddd5c0]'}`}></div>}
                        </React.Fragment>
                      ))}
                    </div>
                  </div>
                )}

                <div className="bg-white rounded-2xl border border-[#ddd5c0] shadow-sm p-6 sm:p-8">
                  {formStep === 1 && (
                    <div className="space-y-5">
                      <div className="flex items-center gap-3 mb-4 border-b border-[#ddd5c0] pb-3">
                        <UserIcon className="text-[#0d1b2a]" size={20} />
                        <h3 className="font-playfair text-lg text-[#0d1b2a]">Identitas Pemberi Kuasa</h3>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                          <label className="block text-xs font-bold text-[#0d1b2a] uppercase tracking-wider mb-2">Nama Lengkap *</label>
                          <input type="text" value={formData.nama_pemberi} onChange={e => setFormData({...formData, nama_pemberi: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-[#ddd5c0] focus:border-[#c9a84c] outline-none" placeholder="Contoh: Muhammad Alhamdi" />
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-[#0d1b2a] uppercase tracking-wider mb-2">Jabatan *</label>
                          <select value={formData.jabatan_pemberi} onChange={e => setFormData({...formData, jabatan_pemberi: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-[#ddd5c0] focus:border-[#c9a84c] outline-none bg-white">
                            <option value="">— Pilih Jabatan —</option>
                            <option value="Ketua">Ketua KOPKAR</option>
                            <option value="Bendahara">Bendahara KOPKAR</option>
                            <option value="Sekretaris">Sekretaris KOPKAR</option>
                            <option value="Manager">Manager KOPKAR</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-[#0d1b2a] uppercase tracking-wider mb-2">No WhatsApp *</label>
                          <input type="text" value={formData.hp_pemberi} onChange={e => setFormData({...formData, hp_pemberi: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-[#ddd5c0] focus:border-[#c9a84c] outline-none" placeholder="0812xxxx" />
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-[#0d1b2a] uppercase tracking-wider mb-2">Email</label>
                          <input type="email" value={formData.email_pemberi} onChange={e => setFormData({...formData, email_pemberi: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-[#ddd5c0] focus:border-[#c9a84c] outline-none" placeholder="email@adaro.com" />
                        </div>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-5 pt-4">
                        <div>
                          <label className="block text-xs font-bold text-[#0d1b2a] uppercase tracking-wider mb-2">Berlaku Mulai *</label>
                          <input type="date" value={formData.berlaku_mulai} onChange={e => setFormData({...formData, berlaku_mulai: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-[#ddd5c0] focus:border-[#c9a84c] outline-none" />
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-[#0d1b2a] uppercase tracking-wider mb-2">Berlaku Sampai *</label>
                          <input type="date" value={formData.berlaku_sampai} onChange={e => setFormData({...formData, berlaku_sampai: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-[#ddd5c0] focus:border-[#c9a84c] outline-none" />
                        </div>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-[#0d1b2a] uppercase tracking-wider mb-2">Alasan Delegasi *</label>
                        <textarea value={formData.alasan} onChange={e => setFormData({...formData, alasan: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-[#ddd5c0] focus:border-[#c9a84c] outline-none h-20 resize-none" placeholder="Contoh: Saya sedang cuti tahunan dan tidak dapat hadir..."></textarea>
                      </div>
                      <div className="pt-4 flex justify-end">
                        <button onClick={() => setFormStep(2)} disabled={!formData.nama_pemberi || !formData.jabatan_pemberi || !formData.alasan} className="bg-[#c9a84c] text-[#0d1b2a] px-8 py-3 rounded-xl font-bold flex items-center gap-2 disabled:opacity-50 transition-colors hover:bg-[#b59542]">
                          Lanjut <ChevronRight size={18} />
                        </button>
                      </div>
                    </div>
                  )}

                  {formStep === 2 && (
                    <div className="space-y-5">
                      <div className="flex items-center gap-3 mb-4 border-b border-[#ddd5c0] pb-3">
                        <Shield className="text-[#0d1b2a]" size={20} />
                        <h3 className="font-playfair text-lg text-[#0d1b2a]">Penerima & Wewenang</h3>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                          <label className="block text-xs font-bold text-[#0d1b2a] uppercase tracking-wider mb-2">Nama Penerima *</label>
                          <input type="text" value={formData.nama_penerima} onChange={e => setFormData({...formData, nama_penerima: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-[#ddd5c0] focus:border-[#c9a84c] outline-none" placeholder="Nama lengkap penerima kuasa" />
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-[#0d1b2a] uppercase tracking-wider mb-2">Jabatan Penerima *</label>
                          <select value={formData.jabatan_penerima} onChange={e => setFormData({...formData, jabatan_penerima: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-[#ddd5c0] focus:border-[#c9a84c] outline-none bg-white">
                            <option value="">— Pilih Jabatan —</option>
                            <option value="Ketua">Ketua KOPKAR</option>
                            <option value="Bendahara">Bendahara KOPKAR</option>
                            <option value="Sekretaris">Sekretaris KOPKAR</option>
                            <option value="Manager">Manager KOPKAR</option>
                          </select>
                        </div>
                        <div className="md:col-span-2">
                          <label className="block text-xs font-bold text-[#0d1b2a] uppercase tracking-wider mb-2">No WhatsApp Penerima *</label>
                          <input type="text" value={formData.hp_penerima} onChange={e => setFormData({...formData, hp_penerima: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-[#ddd5c0] focus:border-[#c9a84c] outline-none" placeholder="0812xxxx" />
                        </div>
                      </div>
                      <div className="pt-2">
                        <label className="block text-xs font-bold text-[#0d1b2a] uppercase tracking-wider mb-3">Pilih Wewenang *</label>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                          {wewenangOptions.map((w, idx) => (
                            <div key={idx} onClick={() => toggleWewenang(w)} className={`flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition-colors ${formData.wewenang.includes(w) ? 'border-[#c9a84c] bg-[#f5e6c0]/40 text-[#0d1b2a]' : 'border-[#ddd5c0] hover:border-[#c9a84c]/50 text-slate-600'}`}>
                              {formData.wewenang.includes(w) ? <CheckSquare size={18} className="text-[#c9a84c]" /> : <SquareIcon size={18} className="text-slate-300" />}
                              <span className="text-sm font-medium">{w}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-[#0d1b2a] uppercase tracking-wider mb-2">Keterangan Tambahan Wewenang</label>
                        <textarea value={formData.keterangan_wewenang} onChange={e => setFormData({...formData, keterangan_wewenang: e.target.value})} className="w-full px-4 py-3 rounded-xl border border-[#ddd5c0] focus:border-[#c9a84c] outline-none h-20 resize-none" placeholder="Tuliskan detail spesifik jika perlu..."></textarea>
                      </div>
                      <div className="pt-4 flex justify-between">
                        <button onClick={() => setFormStep(1)} className="border border-[#ddd5c0] px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-50 transition-colors">
                          <ChevronLeft size={18} /> Kembali
                        </button>
                        <button onClick={() => setFormStep(3)} disabled={!formData.nama_penerima || !formData.jabatan_penerima || formData.wewenang.length === 0} className="bg-[#c9a84c] text-[#0d1b2a] px-8 py-3 rounded-xl font-bold flex items-center gap-2 disabled:opacity-50 transition-colors hover:bg-[#b59542]">
                          Review <ChevronRight size={18} />
                        </button>
                      </div>
                    </div>
                  )}

                  {formStep === 3 && (
                    <div className="space-y-6">
                      <div className="flex items-center gap-3 mb-2 border-b border-[#ddd5c0] pb-3">
                        <FileText className="text-[#0d1b2a]" size={20} />
                        <h3 className="font-playfair text-lg text-[#0d1b2a]">Review & Konfirmasi</h3>
                      </div>
                      <div className="bg-slate-50 p-5 rounded-xl border border-[#ddd5c0] grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div>
                          <p className="text-[10px] uppercase text-slate-500 font-bold mb-1">Pemberi Kuasa</p>
                          <p className="font-bold text-[#0d1b2a]">{formData.nama_pemberi}</p>
                          <p className="text-sm text-slate-600">{formData.jabatan_pemberi}</p>
                        </div>
                        <div>
                          <p className="text-[10px] uppercase text-slate-500 font-bold mb-1">Penerima Kuasa</p>
                          <p className="font-bold text-[#0d1b2a]">{formData.nama_penerima}</p>
                          <p className="text-sm text-slate-600">{formData.jabatan_penerima}</p>
                        </div>
                        <div>
                          <p className="text-[10px] uppercase text-slate-500 font-bold mb-1">Masa Berlaku</p>
                          <p className="text-sm font-medium text-[#0d1b2a]">{formatDateId(formData.berlaku_mulai)} — {formatDateId(formData.berlaku_sampai)}</p>
                        </div>
                        <div>
                          <p className="text-[10px] uppercase text-slate-500 font-bold mb-2">Wewenang</p>
                          <div className="flex flex-wrap gap-2">
                            {formData.wewenang.map((w, i) => <span key={i} className="bg-[#f5e6c0] border border-[#c9a84c] text-[10px] font-bold px-2 py-1 rounded-full text-[#0d1b2a]">{w}</span>)}
                          </div>
                        </div>
                      </div>
                      <div className="bg-[#0d1b2a] p-5 rounded-xl flex gap-3">
                        <span className="text-xl">⚠️</span>
                        <p className="text-[#f5e6c0] text-xs leading-relaxed">Sistem segera merilis dokumen persetujuan kepada atasan terkait setelah Anda mengklik tombol kirim.</p>
                      </div>
                      <div className="pt-2 flex justify-between items-center">
                        <button onClick={() => setFormStep(2)} disabled={isSubmitting} className="border border-[#ddd5c0] px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-50 transition-colors">
                          <ChevronLeft size={18} /> Kembali
                        </button>
                        <button onClick={handleSubmitForm} disabled={isSubmitting} className="bg-[#c9a84c] text-[#0d1b2a] px-8 py-3 rounded-xl font-bold flex items-center gap-2 disabled:opacity-50 hover:bg-[#b59542] transition-colors">
                          {isSubmitting ? 'Memproses...' : 'Kirim Pengajuan'}
                        </button>
                      </div>
                    </div>
                  )}

                  {formStep === 4 && (
                    <div className="text-center py-10 space-y-4 animate-in zoom-in-95">
                      <div className="w-20 h-20 bg-gradient-to-br from-[#c9a84c] to-[#e4c475] rounded-full mx-auto flex items-center justify-center text-white shadow-lg mb-6">
                        <CheckIcon size={40} />
                      </div>
                      <h2 className="font-playfair text-2xl text-[#0d1b2a]">Pengajuan Terkirim!</h2>
                      <p className="text-slate-500 text-sm">Nomor referensi surat kuasa Anda:</p>
                      <div className="font-mono text-xl font-bold bg-slate-50 border border-[#ddd5c0] py-2 px-6 inline-block rounded-lg text-[#0d1b2a] tracking-widest">{submitSuccess}</div>
                      <p className="text-sm text-slate-500 mt-4">Pesan otomatis telah terkirim kepada atasan untuk mendapat persetujuan.</p>
                      <div className="flex justify-center gap-4 pt-6">
                        <button onClick={() => { setAppView('cetak'); setSearchNo(submitSuccess); handleSearch(submitSuccess); }} className="border border-[#0d1b2a] text-[#0d1b2a] px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-[#0d1b2a] hover:text-white transition-colors">Lacak Status</button>
                        <button onClick={resetForm} className="bg-[#0d1b2a] text-[#c9a84c] px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-[#1a365d] transition-colors">Buat Baru</button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* VIEW PORTAL PERSETUJUAN */}
            {appView === 'approval' && (
              <div className="animate-in fade-in duration-500">
                {!isLoggedIn ? (
                  <div className="max-w-md mx-auto mt-10 bg-white rounded-3xl p-8 border border-[#ddd5c0] shadow-sm text-center">
                    <LockIcon className="mx-auto text-[#0d1b2a] mb-4" size={32} />
                    <h2 className="font-playfair text-xl text-[#0d1b2a] mb-2">Portal Persetujuan</h2>
                    <p className="text-xs text-slate-500 mb-6">Pilih peran dan isi PIN keamanan Anda.</p>
                    <select value={approvalRole} onChange={e => setApprovalRole(e.target.value)} className="w-full px-4 py-3 rounded-xl border border-[#ddd5c0] focus:border-[#c9a84c] outline-none mb-4 bg-white text-sm">
                      <option value="">— Pilih Peran —</option>
                      <option value="Ketua">Ketua Koperasi</option>
                      <option value="Manager">Manager KOPKAR</option>
                    </select>
                    <input type="password" placeholder="••••••" maxLength="6" value={approvalPin} onChange={e => setApprovalPin(e.target.value)} className="w-full px-4 py-3 rounded-xl border border-[#ddd5c0] focus:border-[#c9a84c] outline-none font-mono text-center tracking-widest text-xl mb-6" />
                    <button onClick={handleLogin} className="w-full bg-[#0d1b2a] text-[#c9a84c] font-bold py-3 rounded-xl shadow-md hover:bg-[#1a365d] transition-colors">Masuk Sistem</button>
                  </div>
                ) : (
                  <div className="space-y-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                      <div>
                        <h2 className="font-playfair text-2xl text-[#0d1b2a]">Dashboard {approvalRole}</h2>
                        <p className="text-sm text-slate-500 mt-1">Daftar lengkap surat kuasa di sistem KOPKAR AKM.</p>
                      </div>
                      <button onClick={() => { setIsLoggedIn(false); setApprovalPin(''); }} className="flex items-center gap-2 text-xs font-bold text-red-500 hover:text-red-700 bg-red-50 px-3 py-2 rounded-lg border border-red-100 transition-colors"><LogOutIcon size={14}/> Keluar</button>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                      <div className="bg-white rounded-xl p-5 border border-[#ddd5c0]">
                        <div className="font-playfair text-2xl text-[#c9a84c] mb-1">{approvalList.filter(r => needsMyApproval(r)).length}</div>
                        <div className="text-xs text-slate-500 font-bold uppercase">Butuh Proses</div>
                      </div>
                      <div className="bg-white rounded-xl p-5 border border-[#ddd5c0]">
                        <div className="font-playfair text-2xl text-[#1a6b4a] mb-1">{approvalList.filter(r => r.status === 'Disetujui').length}</div>
                        <div className="text-xs text-slate-500 font-bold uppercase">Selesai</div>
                      </div>
                      <div className="bg-white rounded-xl p-5 border border-[#ddd5c0]">
                        <div className="font-playfair text-2xl text-[#c0392b] mb-1">{approvalList.filter(r => r.status === 'Ditolak').length}</div>
                        <div className="text-xs text-slate-500 font-bold uppercase">Ditolak</div>
                      </div>
                      <div className="bg-white rounded-xl p-5 border border-[#ddd5c0]">
                        <div className="font-playfair text-2xl text-[#0d1b2a] mb-1">{approvalList.length}</div>
                        <div className="text-xs text-slate-500 font-bold uppercase">Total Surat</div>
                      </div>
                    </div>

                    <div className="bg-white rounded-2xl border border-[#ddd5c0] overflow-hidden shadow-sm">
                      <div className="overflow-x-auto">
                        <table className="w-full text-left text-sm whitespace-nowrap md:whitespace-normal">
                          <thead>
                            <tr className="bg-slate-50 border-b border-[#ddd5c0] text-[10px] uppercase tracking-wider text-slate-500">
                              <th className="px-5 py-3 font-bold">No. Surat</th>
                              <th className="px-5 py-3 font-bold">Pemberi</th>
                              <th className="px-5 py-3 font-bold">Penerima</th>
                              <th className="px-5 py-3 font-bold">Status</th>
                              <th className="px-5 py-3 font-bold text-right">Aksi</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-[#ddd5c0]">
                            {isLoadingList ? (
                              <tr><td colSpan="5" className="text-center py-10 text-slate-500">Membaca basis data...</td></tr>
                            ) : approvalList.length === 0 ? (
                              <tr><td colSpan="5" className="text-center py-10 text-slate-500">Data bersih. Tidak ada surat.</td></tr>
                            ) : (
                              approvalList.map(row => (
                                <tr key={row.nomorSurat} className="hover:bg-slate-50">
                                  <td className="px-5 py-4 font-mono font-bold text-[#0d1b2a]">{row.nomorSurat}</td>
                                  <td className="px-5 py-4">{row.nama_pemberi}</td>
                                  <td className="px-5 py-4">{row.nama_penerima}</td>
                                  <td className="px-5 py-4">
                                    <span className={`text-[10px] px-2 py-1 rounded-full font-bold uppercase ${row.status.includes('Menunggu') ? 'bg-[#fff8ec] text-[#b06c00]' : row.status === 'Disetujui' ? 'bg-[#eaf5ef] text-[#1a6b4a]' : 'bg-[#fdf0ee] text-[#c0392b]'}`}>
                                      {row.status}
                                    </span>
                                  </td>
                                  <td className="px-5 py-4 text-right">
                                    <button onClick={() => setSelectedSurat(row)} className="text-xs bg-slate-100 hover:bg-slate-200 text-[#0d1b2a] px-3 py-1.5 rounded-lg font-bold transition-colors">Tinjau</button>
                                  </td>
                                </tr>
                              ))
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>

                    {selectedSurat && (
                      <div className="fixed inset-0 bg-[#0d1b2a]/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                        <div className="bg-white rounded-2xl p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto">
                          <h3 className="font-playfair text-xl text-[#0d1b2a] mb-4 border-b pb-2">Tinjauan Surat {selectedSurat.nomorSurat}</h3>
                          <div className="space-y-3 text-sm mb-6">
                            <div className="grid grid-cols-3"><span className="text-slate-500">Pemberi</span><span className="col-span-2 font-bold">{selectedSurat.nama_pemberi}</span></div>
                            <div className="grid grid-cols-3"><span className="text-slate-500">Penerima</span><span className="col-span-2 font-bold">{selectedSurat.nama_penerima}</span></div>
                            <div className="grid grid-cols-3"><span className="text-slate-500">Masa Berlaku</span><span className="col-span-2">{formatDateId(selectedSurat.berlaku_mulai)} - {formatDateId(selectedSurat.berlaku_sampai)}</span></div>
                            <div className="grid grid-cols-3"><span className="text-slate-500">Alasan</span><span className="col-span-2">{selectedSurat.alasan}</span></div>
                            <div className="grid grid-cols-3"><span className="text-slate-500">Wewenang</span><span className="col-span-2">{selectedSurat.wewenang}</span></div>
                          </div>

                          {needsMyApproval(selectedSurat) && (
                            <div className="mb-6">
                              <label className="block text-xs font-bold text-[#0d1b2a] mb-2">Sisipkan Catatan Opsional</label>
                              <textarea value={catatanApproval} onChange={e => setCatatanApproval(e.target.value)} className="w-full p-3 rounded-lg border border-[#ddd5c0] text-sm outline-none focus:border-[#c9a84c]"></textarea>
                            </div>
                          )}

                          <div className="flex justify-end gap-2 pt-4 border-t border-[#ddd5c0]">
                            <button onClick={() => setSelectedSurat(null)} className="px-4 py-2 text-sm border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors">Tutup</button>
                            {needsMyApproval(selectedSurat) && (
                              <>
                                <button onClick={() => handleApprove(selectedSurat.nomorSurat, 'tolak')} className="px-4 py-2 text-sm bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition-colors">Tolak Permintaan</button>
                                <button onClick={() => handleApprove(selectedSurat.nomorSurat, 'setuju')} className="px-4 py-2 text-sm bg-[#1a6b4a] hover:bg-[#14553a] text-white font-bold rounded-lg transition-colors">Setujui Permintaan</button>
                              </>
                            )}
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* VIEW CEK & CETAK */}
            {appView === 'cetak' && (
              <div className="animate-in fade-in duration-500">
                <div className="bg-white rounded-2xl p-8 border border-[#ddd5c0] shadow-sm text-center mb-6 no-print">
                  <h2 className="font-playfair text-2xl text-[#0d1b2a] mb-2">Pelacakan Dokumen</h2>
                  <p className="text-sm text-slate-500 mb-6">Gunakan nomor referensi untuk melacak atau mencetak surat kuasa.</p>
                  <div className="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
                    <input type="text" value={searchNo} onChange={e => setSearchNo(e.target.value)} placeholder="Contoh: SK-2026-001" className="flex-1 px-4 py-3 rounded-xl border border-[#ddd5c0] focus:border-[#c9a84c] outline-none font-mono text-center sm:text-left" />
                    <button onClick={handleSearch} disabled={isSearching} className="bg-[#c9a84c] text-[#0d1b2a] font-bold px-6 py-3 rounded-xl disabled:opacity-50 flex items-center justify-center gap-2 hover:bg-[#b59542] transition-colors">
                      <SearchIcon size={18} /> Lacak
                    </button>
                  </div>
                </div>

                {searchError && (
                  <div className="bg-red-50 text-red-600 p-6 rounded-2xl text-center border border-red-100 no-print">
                    <p className="font-bold">Sistem tidak menemukan nomor tersebut.</p>
                    <p className="text-sm">Periksa kembali penulisan nomor referensi.</p>
                  </div>
                )}

                {searchResult && (
                  <div className="bg-white rounded-2xl border border-[#ddd5c0] shadow-sm overflow-hidden mb-10 no-print">
                    <div className={`p-6 border-b-4 ${searchResult.status === 'Disetujui' ? 'border-[#1a6b4a] bg-[#eaf5ef]' : searchResult.status === 'Ditolak' ? 'border-[#c0392b] bg-[#fdf0ee]' : 'border-[#b06c00] bg-[#fff8ec]'}`}>
                      <h3 className="font-playfair text-xl text-[#0d1b2a] mb-1">Status Dokumen: {searchResult.status}</h3>
                      <p className="font-mono text-sm font-bold opacity-70">No: {searchResult.nomorSurat}</p>
                    </div>
                    <div className="p-6">
                      <div className="grid grid-cols-2 gap-4 text-sm mb-6 border-b pb-6 border-dashed border-slate-200">
                        <div><span className="block text-[10px] uppercase text-slate-500 font-bold">Pemberi</span><span className="font-bold text-[#0d1b2a]">{searchResult.nama_pemberi}</span></div>
                        <div><span className="block text-[10px] uppercase text-slate-500 font-bold">Penerima</span><span className="font-bold text-[#0d1b2a]">{searchResult.nama_penerima}</span></div>
                        <div className="col-span-2"><span className="block text-[10px] uppercase text-slate-500 font-bold">Wewenang</span><span>{searchResult.wewenang}</span></div>
                      </div>

                      <div className="space-y-4">
                        <div className="flex items-center gap-3"><CheckCircle size={16} className="text-[#1a6b4a]" /><span className="text-sm">Pengajuan Berhasil ({formatDateId(searchResult.tgl_submit)})</span></div>
                        <div className="flex items-center gap-3">
                          {searchResult.status_ketua === 'Setuju' ? <CheckCircle size={16} className="text-[#1a6b4a]" /> : searchResult.status_ketua === 'Tolak' ? <XIcon size={16} className="text-red-600" /> : <Clock size={16} className="text-slate-400" />}
                          <span className="text-sm">Respons Ketua {searchResult.catatan_ketua && <span className="text-slate-500 italic">"{searchResult.catatan_ketua}"</span>}</span>
                        </div>
                        <div className="flex items-center gap-3">
                          {searchResult.status_manager === 'Setuju' ? <CheckCircle size={16} className="text-[#1a6b4a]" /> : searchResult.status_manager === 'Tolak' ? <XIcon size={16} className="text-red-600" /> : <Clock size={16} className="text-slate-400" />}
                          <span className="text-sm">Respons Manager {searchResult.catatan_manager && <span className="text-slate-500 italic">"{searchResult.catatan_manager}"</span>}</span>
                        </div>
                      </div>

                      <div className="mt-8">
                        <button onClick={() => window.print()} disabled={searchResult.status !== 'Disetujui'} className="w-full bg-[#0d1b2a] text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 disabled:opacity-40 hover:bg-[#1a365d] transition-colors">
                          <Printer size={18} /> Cetak Salinan PDF
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {/* TAMPILAN CETAK PDF */}
                {searchResult && searchResult.status === 'Disetujui' && (
                  <div id="print-area" className="hidden print-only text-black bg-white min-h-[1050px] p-10 font-serif text-sm">
                    <div className="flex items-start gap-5 border-b-[3px] border-double border-black pb-4 mb-6">
                      <div className="w-16 h-16 bg-[#0d1b2a] flex items-center justify-center font-playfair text-2xl font-bold text-white shrink-0">KA</div>
                      <div className="pt-1">
                        <h2 className="font-serif text-lg font-bold mb-0">KOPERASI KARYAWAN ADARO KARYA MANDIRI</h2>
                        <p className="text-xs">Jl. Jend. A. Yani Komp. Swadharma Jalur II Blok Mawar RT IV, Tabalong, Kalsel</p>
                        <p className="text-[10px] mt-1">Badan Hukum No: 2128/BH/IX | Telp: 0526-2023593 | Email: kopkar.adaro@gmail.com</p>
                      </div>
                    </div>

                    <div className="text-center mb-6">
                      <h3 className="font-serif text-base font-bold underline tracking-widest">SURAT KUASA</h3>
                      <p className="text-xs mt-1">Nomor Referensi: {searchResult.nomorSurat}</p>
                    </div>

                    <div className="leading-relaxed space-y-3">
                      <p>Pihak yang bertanda tangan di bawah ini:</p>
                      <div className="pl-4 space-y-1">
                        <div className="flex"><span className="w-32">Nama Lengkap</span><span>: <strong>{searchResult.nama_pemberi}</strong></span></div>
                        <div className="flex"><span className="w-32">Jabatan</span><span>: {searchResult.jabatan_pemberi} KOPKAR AKM</span></div>
                      </div>

                      <p>Selanjutnya disebut sebagai <strong>PEMBERI KUASA</strong>. Mengingat pihak tersebut <strong>{searchResult.alasan}</strong>, maka wewenang diberikan penuh kepada:</p>
                      <div className="pl-4 space-y-1">
                        <div className="flex"><span className="w-32">Nama Lengkap</span><span>: <strong>{searchResult.nama_penerima}</strong></span></div>
                        <div className="flex"><span className="w-32">Jabatan</span><span>: {searchResult.jabatan_penerima} KOPKAR AKM</span></div>
                      </div>

                      <p>Selanjutnya disebut sebagai <strong>PENERIMA KUASA</strong>. Pihak penerima berhak melaksanakan tindakan berikut ini:</p>
                      <ol className="list-decimal list-outside ml-8 font-bold">
                        {searchResult.wewenang.split(',').map((w, i) => <li key={i} className="pl-1">{w.trim()}</li>)}
                      </ol>

                      <p>Surat penetapan kuasa ini diterbitkan untuk masa berlaku mulai <strong>{formatDateId(searchResult.berlaku_mulai)}</strong> hingga <strong>{formatDateId(searchResult.berlaku_sampai)}</strong>.</p>
                      <p>Demikian surat ini disusun secara resmi agar seluruh pihak yang berkepentingan dapat memakluminya.</p>
                    </div>

                    <div className="mt-12 text-sm">
                      <p className="text-right mb-4">Tanjung, {formatDateId(searchResult.tgl_terbit.split('T')[0])}</p>
                      <div className="flex justify-between text-center mt-10">
                        <div className="w-40">
                          <p className="mb-20">Pemberi Kuasa,</p>
                          <p className="font-bold underline">{searchResult.nama_pemberi}</p>
                        </div>
                        <div className="w-40">
                          <p className="mb-20">Ketua Pengurus,</p>
                          <p className="font-bold underline">Ageng Prasongko</p>
                        </div>
                        <div className="w-40">
                          <p className="mb-20">Penerima Kuasa,</p>
                          <p className="font-bold underline">{searchResult.nama_penerima}</p>
                        </div>
                      </div>
                    </div>

                    <div className="mt-20 border-t border-dashed border-slate-400 pt-2 text-[10px] text-slate-500 text-center">
                      Lembar ini dikeluarkan oleh Sistem e-Surat Kuasa Digital KOPKAR AKM. Validasi Sistem: {searchResult.nomorSurat}
                    </div>
                  </div>
                )}
              </div>
            )}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
