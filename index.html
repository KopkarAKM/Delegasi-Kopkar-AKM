<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>e-Surat Kuasa Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .font-playfair { font-family: 'Playfair Display', serif; }
    
    @media print {
      @page { margin: 1cm; size: A4 portrait; }
      body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      #print-area { padding: 0 !important; border: none !important; box-shadow: none !important; margin: 0 !important; }
    }
  </style>
</head>
<body class="bg-[#faf7f0] text-[#1a1a2e]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ path, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
    );

    const icons = {
      FileText: '<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>',
      CheckCircle: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
      Clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
      Shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
      Printer: '<polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>',
      X: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
      ChevronRight: '<polyline points="9 18 15 12 9 6"/>',
      ChevronLeft: '<polyline points="15 18 9 12 15 6"/>',
      CheckSquare: '<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2-2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
      Square: '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>',
      Check: '<polyline points="20 6 9 17 4 12"/>',
      User: '<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
      Search: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
      Lock: '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
      LogOut: '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>',
      Trash2: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>',
      PenTool: '<path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/>'
    };

    const FileText = (p) => <Icon path={icons.FileText} {...p} />;
    const CheckCircle = (p) => <Icon path={icons.CheckCircle} {...p} />;
    const Clock = (p) => <Icon path={icons.Clock} {...p} />;
    const Shield = (p) => <Icon path={icons.Shield} {...p} />;
    const Printer = (p) => <Icon path={icons.Printer} {...p} />;
    const XIcon = (p) => <Icon path={icons.X} {...p} />;
    const ChevronRight = (p) => <Icon path={icons.ChevronRight} {...p} />;
    const ChevronLeft = (p) => <Icon path={icons.ChevronLeft} {...p} />;
    const CheckSquare = (p) => <Icon path={icons.CheckSquare} {...p} />;
    const SquareIcon = (p) => <Icon path={icons.Square} {...p} />;
    const CheckIcon = (p) => <Icon path={icons.Check} {...p} />;
    const UserIcon = (p) => <Icon path={icons.User} {...p} />;
    const SearchIcon = (p) => <Icon path={icons.Search} {...p} />;
    const LockIcon = (p) => <Icon path={icons.Lock} {...p} />;
    const LogOutIcon = (p) => <Icon path={icons.LogOut} {...p} />;
    const Trash2Icon = (p) => <Icon path={icons.Trash2} {...p} />;
    const PenToolIcon = (p) => <Icon path={icons.PenTool} {...p} />;

    // URL DEPLOY GOOGLE APPS SCRIPT ANDA
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbz3StTZHcqfSPJ53l-PMJDVyAalirTaC_5pUd4Jei0ILIcFTYb_3GL6XSjuf2UDot8T/exec';

    // URL gambar asli (diperbarui sesuai tautan Anda)
    const TTD_KETUA_URL = 'https://i.ibb.co.com/jPt85J0n/ageng-ttd.jpg';
    const TTD_MANAGER_URL = 'https://i.ibb.co.com/Jj2FC9VG/Fedrik-ttd-removebg-preview.png';
    const LOGO_URL = 'https://i.ibb.co.com/WvTwLMn5/image-1.png';

    // Fungsi perantara CDN penembus blokir ImgBB
    const proxify = (url) => {
      if (!url || url.startsWith('data:')) return url;
      const clean = url.replace(/^https?:\/\//, '');
      return `https://wsrv.nl/?url=${encodeURIComponent(clean)}&output=png`;
    };

    // Komponen Khusus Konten Surat agar tidak ada pengulangan kode
    const SuratContent = ({ result, formatDateId }) => (
      <React.Fragment>
        <div className="flex items-center border-b-[3px] border-double border-black pb-4 mb-6">
          <div className="w-20 shrink-0">
            <img src={proxify(LOGO_URL)} alt="Logo KOPKAR AKM" className="w-full h-auto object-contain" />
          </div>
          <div className="flex-1 text-center px-2">
            <h2 className="font-serif text-lg font-bold uppercase tracking-wide text-black mb-1">Koperasi Karyawan Adaro Karya Mandiri</h2>
            <p className="text-[11px] font-semibold text-black mb-1">Badan Hukum Nomor : 2128/BH/IX Tanggal 31 Juli 1995</p>
            <p className="text-[9px] text-black leading-normal">
              Office : Jl. Jend. A. Yani Komp. Swadharma Jalur II Blok Mawar RT IV<br/>
              Kel. Mabuun Kec. Murung Pudak Kab. Tabalong Prov. Kalimantan Selatan Kode Pos 71571<br/>
              Telp/Fax : 0526 – 2023593 &nbsp;|&nbsp; email : kopkar.adaro@gmail.com
            </p>
          </div>
          <div className="w-20 shrink-0"></div>
        </div>

        <div className="text-center mb-5">
          <h3 className="font-serif text-base font-bold underline tracking-widest">SURAT KUASA</h3>
          <p className="text-[11px] mt-1">Nomor Referensi: {result.nomorSurat}</p>
        </div>

        <div className="leading-relaxed space-y-2">
          <p>Pihak yang bertanda tangan di bawah ini:</p>
          <div className="pl-4 space-y-0.5">
            <div className="flex"><span className="w-32">Nama Lengkap</span><span>: <strong>{result.nama_pemberi}</strong></span></div>
            <div className="flex"><span className="w-32">Jabatan</span><span>: {result.jabatan_pemberi} KOPKAR AKM</span></div>
          </div>

          <p className="pt-1">Selanjutnya disebut sebagai <strong>PEMBERI KUASA</strong>. Mengingat pihak tersebut <strong>{result.alasan}</strong>, maka wewenang diberikan penuh kepada:</p>
          <div className="pl-4 space-y-0.5">
            <div className="flex"><span className="w-32">Nama Lengkap</span><span>: <strong>{result.nama_penerima}</strong></span></div>
            <div className="flex"><span className="w-32">Jabatan</span><span>: {result.jabatan_penerima} KOPKAR AKM</span></div>
          </div>

          <p className="pt-1">Selanjutnya disebut sebagai <strong>PENERIMA KUASA</strong>. Pihak penerima berhak melaksanakan tindakan berikut ini:</p>
          <ol className="list-decimal list-outside ml-8 font-bold py-1">
            {result.wewenang.split(',').map((w, i) => <li key={i} className="pl-1">{w.trim()}</li>)}
          </ol>

          <p>Surat penetapan kuasa ini diterbitkan untuk masa berlaku mulai <strong>{formatDateId(result.berlaku_mulai)}</strong> hingga <strong>{formatDateId(result.berlaku_sampai)}</strong>.</p>
          <p>Demikian surat ini disusun secara resmi agar seluruh pihak yang berkepentingan dapat memakluminya.</p>
        </div>

        <div className="mt-8 text-[13px]">
          <p className="text-right mb-2">Tanjung, {formatDateId(result.tgl_terbit.split('T')[0])}</p>
          <div className="flex justify-between text-center mt-4">
            <div className="w-40">
              <p className="mb-1">Pemberi Kuasa,</p>
              <div className="h-20 flex items-center justify-center">
                {result.ttd_pemberi && (
                  <img src={result.ttd_pemberi} alt="Tanda Tangan Pemberi Kuasa" style={{ maxHeight: '70px', maxWidth: '140px', objectFit: 'contain' }} />
                )}
              </div>
              <p className="font-bold underline">{result.nama_pemberi}</p>
            </div>
            <div className="w-40">
              <p className="mb-1">Ketua Pengurus,</p>
              <div className="h-20 flex items-center justify-center">
                <img src={proxify(TTD_KETUA_URL)} alt="Tanda Tangan Ketua" style={{ maxHeight: '70px', maxWidth: '140px', objectFit: 'contain' }} />
              </div>
              <p className="font-bold underline">Ageng Prasongko</p>
            </div>
            <div className="w-40">
              <p className="mb-1">Manager,</p>
              <div className="h-20 flex items-center justify-center">
                <img src={proxify(TTD_MANAGER_URL)} alt="Tanda Tangan Manager" style={{ maxHeight: '70px', maxWidth: '140px', objectFit: 'contain' }} />
              </div>
              <p className="font-bold underline">Fedrik</p>
            </div>
          </div>
        </div>

        <div className="mt-12 border-t border-dashed border-slate-400 pt-2 text-[9px] text-slate-500 text-center">
          Lembar ini dikeluarkan oleh Sistem e-Surat Kuasa Digital KOPKAR AKM. Validasi Sistem: {result.nomorSurat}
        </div>
      </React.Fragment>
    );

    const App = () => {
      const params = new URLSearchParams(window.location.search);
      const initialView = params.get('view') || 'form';
      const initialNo = params.get('no') || '';

      const [appView, setAppView] = useState(initialView);
      const [formStep, setFormStep] = useState(1);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitSuccess, setSubmitSuccess] = useState(null);
      const [formData, setFormData] = useState({
        nama_pemberi: '', jabatan_pemberi: '', hp_pemberi: '', email_pemberi: '', alasan: '',
        berlaku_mulai: '', berlaku_sampai: '',
        nama_penerima: '', jabatan_penerima: '', hp_penerima: '',
        wewenang: [], keterangan_wewenang: ''
      });

      const [signatureData, setSignatureData] = useState(null);
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);

      const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', message: '', onConfirm: null });

      // Preload otomatis gambar saat aplikasi dibuka
      useEffect(() => {
        const urls = [proxify(TTD_KETUA_URL), proxify(TTD_MANAGER_URL), proxify(LOGO_URL)];
        urls.forEach(url => {
          const img = new Image();
          img.src = url;
        });
      }, []);

      const showAlert = (message) => {
        setDialog({ isOpen: true, type: 'alert', message, onConfirm: null });
      };

      const showConfirm = (message, onConfirm) => {
        setDialog({ isOpen: true, type: 'confirm', message, onConfirm });
      };

      const wewenangOptions = [
        'Pencairan Dana', 'Penandatanganan Dokumen', 
        'Urusan Perbankan', 'Mewakili Rapat', 
        'Korespondensi Resmi', 'Lainnya'
      ];

      useEffect(() => {
        const today = new Date();
        const nextWeek = new Date(today);
        nextWeek.setDate(today.getDate() + 7);
        setFormData(prev => ({
          ...prev,
          berlaku_mulai: prev.berlaku_mulai || today.toISOString().split('T')[0],
          berlaku_sampai: prev.berlaku_sampai || nextWeek.toISOString().split('T')[0]
        }));
      }, []);

      const toggleWewenang = (w) => {
        setFormData(prev => ({
          ...prev,
          wewenang: prev.wewenang.includes(w) 
            ? prev.wewenang.filter(item => item !== w) 
            : [...prev.wewenang, w]
        }));
      };

      const startDrawing = (e) => { setIsDrawing(true); draw(e); };
      const stopDrawing = () => {
        setIsDrawing(false);
        if (canvasRef.current) setSignatureData(canvasRef.current.toDataURL('image/png'));
      };
      const draw = (e) => {
        if (!isDrawing) return;
        e.preventDefault(); 
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#0d1b2a';
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
      };
      const clearSignature = () => {
        if (canvasRef.current) {
          const ctx = canvasRef.current.getContext('2d');
          ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
          ctx.beginPath();
        }
        setSignatureData(null);
      };

      const fetchPost = async (payload) => {
        try {
          const res = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          return await res.json();
        } catch (err) {
          console.warn("Kesalahan fetch POST:", err);
          throw err;
        }
      };

      const handleSubmitForm = async () => {
        setIsSubmitting(true);
        try {
          const payload = {
            action: 'submitSuratKuasa',
            ...formData,
            wewenang: formData.wewenang.join(', '),
            ttd_pemberi: signatureData 
          };
          const data = await fetchPost(payload);
          if (data.status === 'ok') {
            setSubmitSuccess(data.nomorSurat);
            setFormStep(4);
          } else {
            showAlert('Gagal mengirim data. ' + data.message);
          }
        } catch (e) {
          showAlert('Koneksi terputus. Pastikan perangkat Anda terhubung ke internet.');
        } finally {
          setIsSubmitting(false);
        }
      };

      const resetForm = () => {
        setFormData({
          ...formData,
          nama_pemberi: '', jabatan_pemberi: '', hp_pemberi: '', email_pemberi: '', alasan: '',
          nama_penerima: '', jabatan_penerima: '', hp_penerima: '', wewenang: [], keterangan_wewenang: ''
        });
        setSignatureData(null);
        setSubmitSuccess(null);
        setFormStep(1);
      };

      const [approvalRole, setApprovalRole] = useState('');
      const [approvalPin, setApprovalPin] = useState('');
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [approvalList, setApprovalList] = useState([]);
      const [isLoadingList, setIsLoadingList] = useState(false);
      const [selectedSurat, setSelectedSurat] = useState(null);
      const [catatanApproval, setCatatanApproval] = useState('');
      const PINS = { Ketua: '1234', Manager: '5678' };

      const handleLogin = () => {
        if (!approvalRole || approvalPin !== PINS[approvalRole]) {
          showAlert('Data autentikasi tidak sesuai.');
          return;
        }
        setIsLoggedIn(true);
        fetchApprovalList(approvalRole);
      };

      const fetchApprovalList = async (role) => {
        setIsLoadingList(true);
        try {
          const data = await fetchPost({ action: 'getList', role: role });
          if (data.status === 'ok') {
            setApprovalList(data.rows || []);
          } else {
            showAlert('Sistem menolak perintah: ' + data.message);
            setApprovalList([]);
          }
        } catch (e) {
          showAlert('Gagal memuat daftar persetujuan. Periksa koneksi internet Anda.');
        } finally {
          setIsLoadingList(false);
        }
      };

      const handleApprove = (nomorSurat, decision) => {
        showConfirm(`Proses tindakan ini untuk dokumen ${nomorSurat}?`, async () => {
          setIsLoadingList(true);
          try {
            const data = await fetchPost({
              action: 'approve',
              nomorSurat,
              role: approvalRole,
              decision,
              catatan: catatanApproval
            });
            if (data.status === 'ok') {
              showAlert('Tindakan berhasil diproses.');
              setSelectedSurat(null);
              setCatatanApproval('');
              fetchApprovalList(approvalRole);
            } else {
              showAlert('Sistem menolak tindakan: ' + data.message);
            }
          } catch (e) {
            showAlert('Koneksi terputus saat mengirim persetujuan.');
          } finally {
            setIsLoadingList(false);
          }
        });
      };

      const needsMyApproval = (row) => {
        if (approvalRole === 'Ketua') return row.status === 'Menunggu Ketua';
        if (approvalRole === 'Manager') return row.status === 'Menunggu Manager';
        return false;
      };

      const [searchNo, setSearchNo] = useState(initialNo);
      const [searchResult, setSearchResult] = useState(null);
      const [isSearching, setIsSearching] = useState(false);
      const [searchError, setSearchError] = useState(false);
      const [publicList, setPublicList] = useState([]);
      const [isLoadingPublicList, setIsLoadingPublicList] = useState(false);

      const fetchPublicList = async () => {
        setIsLoadingPublicList(true);
        try {
          const data = await fetchPost({ action: 'getList', role: 'public' });
          if (data.status === 'ok') {
            const sorted = (data.rows || []).reverse();
            setPublicList(sorted);
          }
        } catch (e) {
          console.warn("Gagal memuat daftar:", e);
        } finally {
          setIsLoadingPublicList(false);
        }
      };

      const handleSearch = async (overrideNo) => {
        const queryNo = typeof overrideNo === 'string' ? overrideNo.trim() : searchNo.trim();
        if (!queryNo) return;
        setIsSearching(true);
        setSearchError(false);
        setSearchResult(null);
        try {
          const data = await fetchPost({ action: 'getSurat', no: queryNo.toUpperCase() });
          
          if (data.status === 'ok' && data.surat) {
            setSearchResult(data.surat);
          } else {
            console.log("Status pelacakan:", data.message || "Dokumen tidak terdaftar di sistem");
            setSearchError(true);
          }
        } catch (e) {
          console.warn("Kegagalan komunikasi:", e);
          setSearchError(true);
        } finally {
          setIsSearching(false);
        }
      };

      useEffect(() => {
        if (initialView === 'cetak' && initialNo) {
          handleSearch(initialNo);
        }
        if (appView === 'cetak') {
          fetchPublicList();
        }
      }, [appView, initialView, initialNo]);

      const formatDateId = (dStr) => {
        if (!dStr) return '-';
        const dateObj = new Date(dStr);
        if (!isNaN(dateObj)) {
          const d = dateObj.getDate();
          const m = dateObj.getMonth();
          const y = dateObj.getFullYear();
          const bln = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
          return `${d} ${bln[m]} ${y}`;
        }
        return dStr;
      };

      useEffect(() => {
        if (appView === 'cetak' && searchResult && searchResult.status === 'Disetujui') {
          const tgl = searchResult.tgl_terbit ? searchResult.tgl_terbit.split('T')[0] : '';
          document.title = `${searchResult.nomorSurat} - ${formatDateId(tgl)}`;
        } else {
          document.title = 'e-Surat Kuasa Digital';
        }
      }, [appView, searchResult]);

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-[#0d1b2a] relative overflow-hidden no-print">
            <div className="absolute -top-16 -right-16 w-72 h-72 rounded-full bg-[#c9a84c] opacity-10 blur-3xl pointer-events-none"></div>
            <div className="max-w-5xl mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-4 relative z-10">
              <div className="flex items-center gap-4 w-full md:w-auto">
                <div className="w-12 h-12 bg-[#c9a84c] rounded-xl flex items-center justify-center font-playfair text-xl font-bold text-[#0d1b2a]">
                  KA
                </div>
                <div>
                  <h1 className="font-playfair text-lg text-white tracking-wide leading-tight">e-Surat Kuasa Digital</h1>
                  <p className="text-[11px] text-white/60 mt-0.5">Koperasi Karyawan Adaro Karya Mandiri</p>
                </div>
              </div>
              <div className="flex gap-2 w-full md:w-auto overflow-x-auto pb-1 md:pb-0">
                <button onClick={() => setAppView('form')} className={`px-4 py-2 rounded-lg text-xs font-semibold whitespace-nowrap transition-colors ${appView === 'form' ? 'bg-[#c9a84c] text-[#0d1b2a]' : 'border border-[#c9a84c]/40 text-[#e4c475] hover:bg-[#c9a84c]/10'}`}>Buat Surat</button>
                <button onClick={() => setAppView('approval')} className={`px-4 py-2 rounded-lg text-xs font-semibold whitespace-nowrap transition-colors ${appView === 'approval' ? 'bg-[#c9a84c] text-[#0d1b2a]' : 'border border-[#c9a84c]/40 text-[#e4c475] hover:bg-[#c9a84c]/10'}`}>Persetujuan</button>

                                    <button onClick={() => setSelectedSurat(row)} className="text-xs bg-slate-100 hover:bg-slate-200 text-[#0d1b2a] px-3 py-1.5 rounded-lg font-bold transition-colors">Tinjau</button>
                                  </td>
                                </tr>
                              ))
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>

                    {selectedSurat && (
                      <div className="fixed inset-0 bg-[#0d1b2a]/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                        <div className="bg-white rounded-2xl p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto">
                          <h3 className="font-playfair text-xl text-[#0d1b2a] mb-4 border-b pb-2">Tinjauan Surat {selectedSurat.nomorSurat}</h3>
                          <div className="space-y-3 text-sm mb-6">
                            <div className="grid grid-cols-3"><span className="text-slate-500">Pemberi</span><span className="col-span-2 font-bold">{selectedSurat.nama_pemberi}</span></div>
                            <div className="grid grid-cols-3"><span className="text-slate-500">Penerima</span><span className="col-span-2 font-bold">{selectedSurat.nama_penerima}</span></div>
                            <div className="grid grid-cols-3"><span className="text-slate-500">Masa Berlaku</span><span className="col-span-2">{formatDateId(selectedSurat.berlaku_mulai)} - {formatDateId(selectedSurat.berlaku_sampai)}</span></div>
                            <div className="grid grid-cols-3"><span className="text-slate-500">Alasan</span><span className="col-span-2">{selectedSurat.alasan}</span></div>
                            <div className="grid grid-cols-3"><span className="text-slate-500">Wewenang</span><span className="col-span-2">{selectedSurat.wewenang}</span></div>
                            
                            {selectedSurat.ttd_pemberi && (
                              <div className="grid grid-cols-3 items-center border-t border-dashed border-[#ddd5c0] pt-3 mt-3">
                                <span className="text-slate-500">Tanda Tangan Pemberi</span>
                                <span className="col-span-2">
                                  <img src={selectedSurat.ttd_pemberi} alt="TTD" className="h-16 object-contain border border-[#ddd5c0] rounded bg-slate-50 px-2 py-1" />
                                </span>
                              </div>
                            )}

                            <div className="mt-4 border-t border-[#ddd5c0] pt-4">
                              <p className="text-[10px] uppercase text-slate-500 font-bold mb-3">Riwayat Persetujuan</p>
                              <div className="space-y-3">
                                <div className="flex items-start gap-3">
                                  <div className={`mt-0.5 w-5 h-5 rounded-full flex items-center justify-center text-[10px] ${selectedSurat.status_ketua === 'Setuju' ? 'bg-[#eaf5ef] text-[#1a6b4a]' : selectedSurat.status_ketua === 'Tolak' ? 'bg-[#fdf0ee] text-[#c0392b]' : 'bg-slate-100 text-slate-400'}`}>
                                    {selectedSurat.status_ketua === 'Setuju' ? '✓' : selectedSurat.status_ketua === 'Tolak' ? '✗' : '⏳'}
                                  </div>
                                  <div>
                                    <p className="text-sm font-bold text-[#0d1b2a]">Ketua Koperasi {selectedSurat.status_ketua ? `(${selectedSurat.status_ketua})` : '(Menunggu)'}</p>
                                    {selectedSurat.tgl_ketua && <p className="text-xs text-slate-500">{formatDateId(selectedSurat.tgl_ketua.split('T')[0])}</p>}
                                    {selectedSurat.catatan_ketua && <p className="text-xs italic text-slate-600 mt-1">"{selectedSurat.catatan_ketua}"</p>}
                                  </div>
                                </div>
                                
                                <div className="flex items-start gap-3">
                                  <div className={`mt-0.5 w-5 h-5 rounded-full flex items-center justify-center text-[10px] ${selectedSurat.status_manager === 'Setuju' ? 'bg-[#eaf5ef] text-[#1a6b4a]' : selectedSurat.status_manager === 'Tolak' ? 'bg-[#fdf0ee] text-[#c0392b]' : 'bg-slate-100 text-slate-400'}`}>
                                    {selectedSurat.status_manager === 'Setuju' ? '✓' : selectedSurat.status_manager === 'Tolak' ? '✗' : '⏳'}
                                  </div>
                                  <div>
                                    <p className="text-sm font-bold text-[#0d1b2a]">Manager KOPKAR {selectedSurat.status_manager ? `(${selectedSurat.status_manager})` : '(Menunggu)'}</p>
                                    {selectedSurat.tgl_manager && <p className="text-xs text-slate-500">{formatDateId(selectedSurat.tgl_manager.split('T')[0])}</p>}
                                    {selectedSurat.catatan_manager && <p className="text-xs italic text-slate-600 mt-1">"{selectedSurat.catatan_manager}"</p>}
                                  </div>
                                </div>
                              </div>
                            </div>
                          </div>

                          {needsMyApproval(selectedSurat) && (
                            <div className="mb-6">
                              <label className="block text-xs font-bold text-[#0d1b2a] mb-2">Sisipkan Catatan Opsional</label>
                              <textarea value={catatanApproval} onChange={e => setCatatanApproval(e.target.value)} className="w-full p-3 rounded-lg border border-[#ddd5c0] text-sm outline-none focus:border-[#c9a84c]"></textarea>
                            </div>
                          )}

                          <div className="flex justify-end gap-2 pt-4 border-t border-[#ddd5c0]">
                            <button onClick={() => setSelectedSurat(null)} className="px-4 py-2 text-sm border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors">Tutup</button>
                            
                            {needsMyApproval(selectedSurat) ? (
                              <>
                                <button onClick={() => handleApprove(selectedSurat.nomorSurat, 'tolak')} className="px-4 py-2 text-sm bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition-colors">Tolak Permintaan</button>
                                <button onClick={() => handleApprove(selectedSurat.nomorSurat, 'setuju')} className="px-4 py-2 text-sm bg-[#1a6b4a] hover:bg-[#14553a] text-white font-bold rounded-lg transition-colors">Setujui Permintaan</button>
                              </>
                            ) : selectedSurat.status === 'Disetujui' ? (
                              <button onClick={() => { setAppView('cetak'); setSearchNo(selectedSurat.nomorSurat); handleSearch(selectedSurat.nomorSurat); setSelectedSurat(null); }} className="px-4 py-2 text-sm bg-[#c9a84c] text-[#0d1b2a] font-bold rounded-lg transition-colors hover:bg-[#b59542]">Lihat & Cetak Surat Resmi</button>
                            ) : null}
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {appView === 'cetak' && (
              <div className="animate-in fade-in duration-500">
                {!searchResult ? (
                  <>
                    <div className="bg-white rounded-2xl p-8 border border-[#ddd5c0] shadow-sm text-center mb-6 no-print">
                      <h2 className="font-playfair text-2xl text-[#0d1b2a] mb-2">Pelacakan Dokumen</h2>
                      <p className="text-sm text-slate-500 mb-6">Gunakan nomor referensi atau pilih dari daftar di bawah untuk melacak surat kuasa.</p>
                      <div className="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
                        <input type="text" value={searchNo} onChange={e => setSearchNo(e.target.value)} placeholder="Contoh: SK-2026-001" className="flex-1 px-4 py-3 rounded-xl border border-[#ddd5c0] focus:border-[#c9a84c] outline-none font-mono text-center sm:text-left" />
                        <button onClick={() => handleSearch(searchNo)} disabled={isSearching} className="bg-[#c9a84c] text-[#0d1b2a] font-bold px-6 py-3 rounded-xl disabled:opacity-50 flex items-center justify-center gap-2 hover:bg-[#b59542] transition-colors">
                          <SearchIcon size={18} /> Lacak
                        </button>
                      </div>
                    </div>

                    {searchError && (
                      <div className="bg-red-50 text-red-600 p-6 rounded-2xl text-center border border-red-100 mb-6 no-print">
                        <p className="font-bold">Sistem tidak menemukan nomor tersebut.</p>
                        <p className="text-sm">Periksa kembali penulisan nomor referensi.</p>
                      </div>
                    )}

                    <div className="bg-white rounded-2xl border border-[#ddd5c0] overflow-hidden shadow-sm no-print mb-10">
                      <div className="p-5 border-b border-[#ddd5c0] bg-slate-50 flex justify-between items-center">
                        <h3 className="font-playfair text-lg text-[#0d1b2a]">Daftar Pengajuan Terbaru</h3>
                        <button onClick={fetchPublicList} className="text-xs font-bold text-[#c9a84c] hover:text-[#b59542]">Segarkan</button>
                      </div>
                      <div className="overflow-x-auto">
                        <table className="w-full text-left text-sm whitespace-nowrap md:whitespace-normal">
                          <thead>
                            <tr className="bg-slate-50 border-b border-[#ddd5c0] text-[10px] uppercase tracking-wider text-slate-500">
                              <th className="px-5 py-3 font-bold">No. Surat</th>
                              <th className="px-5 py-3 font-bold">Pemberi</th>
                              <th className="px-5 py-3 font-bold">Penerima</th>
                              <th className="px-5 py-3 font-bold">Status</th>
                              <th className="px-5 py-3 font-bold text-right">Aksi</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-[#ddd5c0]">
                            {isLoadingPublicList ? (
                              <tr><td colSpan="5" className="text-center py-10 text-slate-500">Membaca basis data...</td></tr>
                            ) : publicList.length === 0 ? (
                              <tr><td colSpan="5" className="text-center py-10 text-slate-500">Belum ada pengajuan surat kuasa.</td></tr>
                            ) : (
                              publicList.map(row => (
                                <tr key={row.nomorSurat} className="hover:bg-slate-50">
                                  <td className="px-5 py-4 font-mono font-bold text-[#0d1b2a]">{row.nomorSurat}</td>
                                  <td className="px-5 py-4">{row.nama_pemberi}</td>
                                  <td className="px-5 py-4">{row.nama_penerima}</td>
                                  <td className="px-5 py-4">
                                    <span className={`text-[10px] px-2 py-1 rounded-full font-bold uppercase ${
                                      row.status === 'Menunggu Ketua' ? 'bg-[#fff8ec] text-[#b06c00]' : 
                                      row.status === 'Menunggu Manager' ? 'bg-[#e8f4ff] text-[#1a5b9a]' : 
                                      row.status === 'Disetujui' ? 'bg-[#eaf5ef] text-[#1a6b4a]' : 
                                      'bg-[#fdf0ee] text-[#c0392b]'
                                    }`}>
                                      {row.status === 'Menunggu Manager' ? 'ACC Ketua' : row.status}
                                    </span>
                                  </td>
                                  <td className="px-5 py-4 text-right">
                                    <button onClick={() => handleSearch(row.nomorSurat)} className="text-xs bg-[#c9a84c] hover:bg-[#b59542] text-[#0d1b2a] px-4 py-1.5 rounded-lg font-bold transition-colors">Lacak</button>
                                  </td>
                                </tr>
                              ))
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </>
                ) : (
                  <>
                    <button onClick={() => { setSearchResult(null); setSearchNo(''); fetchPublicList(); }} className="mb-6 text-sm font-bold flex items-center gap-2 text-slate-500 hover:text-[#0d1b2a] transition-colors no-print">
                      <ChevronLeft size={18} /> Kembali ke Daftar Surat
                    </button>

                    <div className="bg-white rounded-2xl border border-[#ddd5c0] shadow-sm overflow-hidden mb-10 no-print">
                      <div className={`p-6 border-b-4 ${searchResult.status === 'Disetujui' ? 'border-[#1a6b4a] bg-[#eaf5ef]' : searchResult.status === 'Ditolak' ? 'border-[#c0392b] bg-[#fdf0ee]' : 'border-[#b06c00] bg-[#fff8ec]'}`}>
                        <h3 className="font-playfair text-xl text-[#0d1b2a] mb-1">Status Dokumen: {searchResult.status}</h3>
                        <p className="font-mono text-sm font-bold opacity-70">No: {searchResult.nomorSurat}</p>
                      </div>
                      <div className="p-6">
                        <div className="grid grid-cols-2 gap-4 text-sm mb-6 border-b pb-6 border-dashed border-slate-200">
                          <div><span className="block text-[10px] uppercase text-slate-500 font-bold">Pemberi</span><span className="font-bold text-[#0d1b2a]">{searchResult.nama_pemberi}</span></div>
                          <div><span className="block text-[10px] uppercase text-slate-500 font-bold">Penerima</span><span className="font-bold text-[#0d1b2a]">{searchResult.nama_penerima}</span></div>
                          <div className="col-span-2"><span className="block text-[10px] uppercase text-slate-500 font-bold">Wewenang</span><span>{searchResult.wewenang}</span></div>
                        </div>

                        <div className="space-y-4">
                          <div className="flex items-center gap-3"><CheckCircle size={16} className="text-[#1a6b4a]" /><span className="text-sm">Pengajuan Berhasil ({formatDateId(searchResult.tgl_submit.split('T')[0])})</span></div>
                          <div className="flex items-center gap-3">
                            {searchResult.status_ketua === 'Setuju' ? <CheckCircle size={16} className="text-[#1a6b4a]" /> : searchResult.status_ketua === 'Tolak' ? <XIcon size={16} className="text-red-600" /> : <Clock size={16} className="text-slate-400" />}
                            <span className="text-sm">Respons Ketua {searchResult.catatan_ketua && <span className="text-slate-500 italic">"{searchResult.catatan_ketua}"</span>}</span>
                          </div>
                          <div className="flex items-center gap-3">
                            {searchResult.status_manager === 'Setuju' ? <CheckCircle size={16} className="text-[#1a6b4a]" /> : searchResult.status_manager === 'Tolak' ? <XIcon size={16} className="text-red-600" /> : <Clock size={16} className="text-slate-400" />}
                            <span className="text-sm">Respons Manager {searchResult.catatan_manager && <span className="text-slate-500 italic">"{searchResult.catatan_manager}"</span>}</span>
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* PRATINJAU TAMPIL DI LAYAR SEBELUM DICETAK */}
                    {searchResult && searchResult.status === 'Disetujui' && (
                      <div className="mt-10 border-t border-dashed border-slate-300 pt-8">
                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 no-print">
                          <div>
                            <h3 className="font-playfair text-xl text-[#0d1b2a]">Pratinjau Surat Resmi</h3>
                            <p className="text-sm text-slate-500">Bentuk fisik dokumen A4 Anda.</p>
                          </div>
                          <button onClick={() => window.print()} className="bg-[#0d1b2a] text-white py-3 px-6 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-[#1a365d] transition-colors shadow-md">
                            <Printer size={18} /> Cetak Salinan PDF
                          </button>
                        </div>
                        
                        {/* Container Kertas di Layar (Visualisasi) */}
                        <div className="bg-slate-200 p-4 sm:p-8 rounded-2xl overflow-x-auto flex justify-center border border-slate-300 no-print">
                          <div className="bg-white w-[210mm] min-h-[297mm] p-[15mm] sm:p-[20mm] shadow-lg text-black font-serif text-[13px] leading-snug shrink-0">
                            <SuratContent result={searchResult} formatDateId={formatDateId} />
                          </div>
                        </div>

                        {/* Container Kertas Sesungguhnya Saat di-Print */}
                        <div className="hidden print-only">
                          <div id="print-area" className="bg-white text-black font-serif text-[13px] leading-snug">
                            <SuratContent result={searchResult} formatDateId={formatDateId} />
                          </div>
                        </div>
                      </div>
                    )}
                  </>
                )}
              </div>
            )}
          </main>

          {/* MODAL DIALOG CUSTOM (Global) */}
          {dialog.isOpen && (
            <div className="fixed inset-0 bg-[#0d1b2a]/70 backdrop-blur-sm flex items-center justify-center p-4 z-[9999] no-print">
              <div className="bg-white rounded-2xl p-6 w-full max-w-sm text-center shadow-2xl animate-in zoom-in-95">
                <div className="w-12 h-12 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl border border-[#ddd5c0]">
                  {dialog.type === 'confirm' ? '❓' : '⚠️'}
                </div>
                <p className="text-[#0d1b2a] font-medium mb-6 leading-relaxed text-sm">{dialog.message}</p>
                <div className="flex justify-center gap-3">
                  {dialog.type === 'confirm' && (
                    <button onClick={() => setDialog(prev => ({ ...prev, isOpen: false }))} className="px-5 py-2.5 rounded-xl border border-[#ddd5c0] text-slate-600 font-bold hover:bg-slate-50 transition-colors text-sm">
                      Batal
                    </button>
                  )}
                  <button onClick={() => {
                    setDialog(prev => ({ ...prev, isOpen: false }));
                    if (dialog.type === 'confirm' && dialog.onConfirm) {
                      dialog.onConfirm();
                    }
                  }} className="px-5 py-2.5 rounded-xl bg-[#c9a84c] text-[#0d1b2a] font-bold hover:bg-[#b59542] transition-colors text-sm shadow-md">
                    {dialog.type === 'confirm' ? 'Ya, Lanjutkan' : 'Mengerti'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
